<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SchoolSync ERP — Enterprise Presentation</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Sans:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0c1929;
      --navy-soft: #152238;
      --blue: #1d4ed8;
      --blue-bright: #3b82f6;
      --cyan: #06b6d4;
      --teal: #14b8a6;
      --white: #ffffff;
      --off: #f4f7fb;
      --line: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --slide-w: 1280px;
      --slide-h: 720px;
      --pad: 48px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; overflow: hidden;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #0a0f18;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .deck {
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }

    /* ─── Slide shell ─── */
    .slide {
      display: none;
      flex-direction: column;
      width: min(var(--slide-w), 96vw);
      height: min(var(--slide-h), calc(96vw * 9 / 16));
      max-height: 92vh;
      background: var(--white);
      border-radius: 4px;
      box-shadow: 0 32px 80px rgba(0,0,0,.45), 0 0 0 1px rgba(255,255,255,.06);
      position: relative;
      overflow: hidden;
    }
    .slide.active { display: flex; animation: slideIn .45s cubic-bezier(.22,1,.36,1); }
    @keyframes slideIn {
      from { opacity: 0; transform: scale(.985); }
      to { opacity: 1; transform: none; }
    }

    /* Dark variant */
    .slide.dark {
      background: linear-gradient(155deg, #0c1929 0%, #111d33 50%, #0a1628 100%);
      color: #f1f5f9;
    }
    .slide.dark .chrome { border-color: rgba(255,255,255,.08); }
    .slide.dark .chrome-logo text { fill: #f1f5f9; }
    .slide.dark .chrome-right { color: rgba(255,255,255,.45); }
    .slide.dark .foot { border-color: rgba(255,255,255,.08); color: rgba(255,255,255,.4); }
    .slide.dark .kicker { color: var(--cyan); }
    .slide.dark h1 { color: #fff; }
    .slide.dark .lead { color: rgba(255,255,255,.65); }

    /* Section divider */
    .slide.section.dark::after {
      content: '';
      position: absolute; right: -80px; bottom: -80px;
      width: 400px; height: 400px; border-radius: 50%;
      border: 1px solid rgba(59,130,246,.15);
      pointer-events: none;
    }
    .slide.section .section-num {
      font-family: 'Instrument Sans', sans-serif;
      font-size: 8rem; font-weight: 700; line-height: 1;
      background: linear-gradient(180deg, rgba(59,130,246,.35), transparent);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      margin-bottom: 8px;
    }

    /* ─── Chrome (header bar) ─── */
    .chrome {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px var(--pad) 16px;
      border-bottom: 1px solid var(--line);
    }
    .chrome-right {
      font-size: 11px; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; color: var(--muted);
    }
    .slide.dark .chrome { background: rgba(0,0,0,.15); }

    /* ─── Content area ─── */
    .content {
      flex: 1; min-height: 0;
      padding: 28px var(--pad) 20px;
      display: flex; flex-direction: column;
      position: relative; z-index: 1;
    }
    .content.center { justify-content: center; align-items: center; text-align: center; }

    .kicker {
      font-size: 11px; font-weight: 700; letter-spacing: .14em;
      text-transform: uppercase; color: var(--blue);
      margin-bottom: 10px;
    }
    h1 {
      font-family: 'Instrument Sans', sans-serif;
      font-size: clamp(1.75rem, 3vw, 2.35rem);
      font-weight: 700; line-height: 1.15;
      letter-spacing: -.02em; color: var(--navy);
      max-width: 900px;
    }
    h1 .accent { color: var(--blue); }
    .lead {
      font-size: 15px; line-height: 1.65; color: var(--muted);
      margin-top: 12px; max-width: 780px;
    }
    .content-body { flex: 1; min-height: 0; margin-top: 24px; display: flex; flex-direction: column; justify-content: center; }

    /* ─── Footer ─── */
    .foot {
      flex-shrink: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px var(--pad);
      border-top: 1px solid var(--line);
      font-size: 11px; color: var(--muted);
    }
    .foot strong { color: var(--navy); font-weight: 600; }
    .slide.dark .foot strong { color: rgba(255,255,255,.7); }

    /* ─── Components ─── */
    .accent-bar {
      position: absolute; left: 0; top: 0; bottom: 0; width: 5px;
      background: linear-gradient(180deg, var(--blue), var(--cyan));
    }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }

    .panel {
      background: var(--off); border: 1px solid var(--line);
      border-radius: 12px; padding: 20px 22px;
      position: relative;
    }
    .slide.dark .panel {
      background: rgba(255,255,255,.04); border-color: rgba(255,255,255,.08);
    }
    .panel h3 {
      font-family: 'Instrument Sans', sans-serif;
      font-size: 14px; font-weight: 700; margin-bottom: 10px;
      color: var(--navy); display: flex; align-items: center; gap: 8px;
    }
    .slide.dark .panel h3 { color: #f1f5f9; }
    .panel p, .panel li { font-size: 13px; line-height: 1.55; color: var(--muted); }
    .panel ul { padding-left: 18px; }
    .panel li { margin-bottom: 6px; }
    .panel .ico {
      width: 36px; height: 36px; border-radius: 10px;
      display: grid; place-items: center; font-size: 16px; margin-bottom: 12px;
      background: linear-gradient(135deg, #dbeafe, #e0f2fe);
    }
    .slide.dark .panel .ico { background: rgba(59,130,246,.15); }

    .panel.neg { border-left: 3px solid #ef4444; }
    .panel.pos { border-left: 3px solid var(--teal); }

    .metric {
      text-align: center; padding: 22px 16px;
      background: var(--off); border: 1px solid var(--line); border-radius: 12px;
    }
    .slide.dark .metric { background: rgba(255,255,255,.04); border-color: rgba(255,255,255,.08); }
    .metric .val {
      font-family: 'Instrument Sans', sans-serif;
      font-size: 2rem; font-weight: 700; color: var(--blue);
      line-height: 1; margin-bottom: 6px;
    }
    .slide.dark .metric .val { color: #60a5fa; }
    .metric .lbl { font-size: 12px; color: var(--muted); font-weight: 500; }

    .agenda { list-style: none; counter-reset: ag; }
    .agenda li {
      counter-increment: ag;
      display: grid; grid-template-columns: 44px 1fr auto;
      align-items: center; gap: 16px;
      padding: 14px 0; border-bottom: 1px solid var(--line);
      font-size: 14px; font-weight: 500; color: var(--navy);
    }
    .agenda li::before {
      content: counter(ag, decimal-leading-zero);
      font-family: 'Instrument Sans', sans-serif;
      font-size: 13px; font-weight: 700; color: var(--blue);
      background: #eff6ff; width: 36px; height: 36px; border-radius: 8px;
      display: grid; place-items: center;
    }
    .agenda li span:last-child { font-size: 12px; color: var(--muted); font-weight: 400; }

    .pipeline {
      display: flex; align-items: stretch; gap: 0; margin: 8px 0;
    }
    .pipe-step {
      flex: 1; text-align: center; padding: 16px 10px;
      background: var(--off); border: 1px solid var(--line);
      position: relative; font-size: 12px; font-weight: 600; color: var(--navy);
    }
    .pipe-step:first-child { border-radius: 10px 0 0 10px; }
    .pipe-step:last-child { border-radius: 0 10px 10px 0; }
    .pipe-step small { display: block; font-weight: 400; color: var(--muted); margin-top: 4px; font-size: 10px; }
    .pipe-step.active { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }
    .pipe-step.active small { color: rgba(255,255,255,.75); }
    .pipe-step + .pipe-step { border-left: none; }
    .slide.dark .pipe-step { background: rgba(255,255,255,.05); border-color: rgba(255,255,255,.1); color: #e2e8f0; }
    .slide.dark .pipe-step.active { background: #2563eb; }

    .steps { display: flex; flex-direction: column; gap: 10px; }
    .step {
      display: grid; grid-template-columns: 32px 1fr; gap: 14px; align-items: start;
    }
    .step-n {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--blue); color: #fff;
      font-size: 12px; font-weight: 700;
      display: grid; place-items: center;
    }
    .step strong { font-size: 13px; color: var(--navy); display: block; margin-bottom: 2px; }
    .slide.dark .step strong { color: #f1f5f9; }
    .step span { font-size: 12px; color: var(--muted); line-height: 1.45; }

    .role-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
    .role {
      text-align: center; padding: 18px 12px;
      border: 1px solid var(--line); border-radius: 12px; background: var(--white);
    }
    .slide.dark .role { background: rgba(255,255,255,.03); border-color: rgba(255,255,255,.08); }
    .role .dot {
      width: 44px; height: 44px; border-radius: 12px; margin: 0 auto 10px;
      display: grid; place-items: center; font-size: 11px; font-weight: 800;
    }
    .role h4 { font-size: 12px; font-weight: 700; margin-bottom: 4px; color: var(--navy); }
    .slide.dark .role h4 { color: #f1f5f9; }
    .role p { font-size: 10px; color: var(--muted); line-height: 1.4; }

    .phase-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .phase {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 12px 14px; border-radius: 10px;
      background: var(--off); border: 1px solid var(--line);
    }
    .slide.dark .phase { background: rgba(255,255,255,.04); border-color: rgba(255,255,255,.08); }
    .phase .n {
      flex-shrink: 0; width: 32px; height: 32px; border-radius: 8px;
      background: var(--blue); color: #fff;
      font-size: 13px; font-weight: 700;
      display: grid; place-items: center;
    }
    .phase h4 { font-size: 12px; font-weight: 700; color: var(--navy); margin-bottom: 2px; }
    .slide.dark .phase h4 { color: #f1f5f9; }
    .phase p { font-size: 11px; color: var(--muted); line-height: 1.35; }

    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th {
      text-align: left; padding: 10px 12px;
      background: var(--navy); color: #fff; font-weight: 600;
      font-size: 11px; letter-spacing: .03em;
    }
    th:first-child { border-radius: 8px 0 0 0; }
    th:last-child { border-radius: 0 8px 0 0; }
    td { padding: 9px 12px; border-bottom: 1px solid var(--line); color: var(--text); }
    tr:nth-child(even) td { background: var(--off); }
    .slide.dark td { border-color: rgba(255,255,255,.06); color: #cbd5e1; }
    .slide.dark tr:nth-child(even) td { background: rgba(255,255,255,.02); }

    .callout {
      margin-top: 14px; padding: 12px 16px; border-radius: 8px;
      background: #fffbeb; border: 1px solid #fde68a;
      font-size: 12px; color: #92400e; line-height: 1.5;
    }
    .slide.dark .callout { background: rgba(245,158,11,.1); border-color: rgba(245,158,11,.25); color: #fcd34d; }

    .hero-title {
      font-family: 'Instrument Sans', sans-serif;
      font-size: clamp(2.5rem, 5vw, 3.5rem);
      font-weight: 700; line-height: 1.08; letter-spacing: -.03em;
      color: #fff; max-width: 800px;
    }
    .hero-title span { color: #60a5fa; }
    .hero-sub { font-size: 18px; color: rgba(255,255,255,.7); margin-top: 20px; max-width: 560px; line-height: 1.6; }
    .hero-meta { display: flex; gap: 32px; margin-top: 40px; }
    .hero-meta div { border-left: 2px solid var(--cyan); padding-left: 16px; }
    .hero-meta b { display: block; font-size: 13px; color: #fff; margin-bottom: 2px; }
    .hero-meta span { font-size: 12px; color: rgba(255,255,255,.5); }

    .orb { position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none; }
    .orb-1 { width: 500px; height: 500px; background: rgba(37,99,235,.2); top: -200px; right: -100px; }
    .orb-2 { width: 300px; height: 300px; background: rgba(6,182,212,.12); bottom: -100px; left: 10%; }

  /* Controls */
    .controls {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 8px; z-index: 300;
      background: rgba(12,25,41,.92); border: 1px solid rgba(255,255,255,.1);
      padding: 8px 14px; border-radius: 12px; backdrop-filter: blur(16px);
    }
    .controls button {
      width: 36px; height: 36px; border-radius: 8px; border: none;
      background: rgba(255,255,255,.08); color: #fff; cursor: pointer; font-size: 18px;
    }
    .controls button:hover { background: var(--blue); }
    .controls span { color: rgba(255,255,255,.6); font-size: 12px; font-weight: 600; min-width: 52px; text-align: center; }
    .hint {
      position: fixed; top: 16px; right: 16px; z-index: 300;
      font-size: 10px; color: rgba(255,255,255,.4);
      background: rgba(12,25,41,.8); padding: 6px 12px; border-radius: 6px;
    }

    @media print {
      body { overflow: visible; background: #fff; }
      .deck { display: block; height: auto; }
      .slide { display: flex !important; page-break-after: always; width: 100%; height: 100vh; max-height: none; border-radius: 0; box-shadow: none; }
      .controls, .hint { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="hint">← → Navigate · F11 Fullscreen · Ctrl+P Export PDF</div>
  <div class="deck" id="deck"></div>
  <div class="controls">
    <button id="prev" aria-label="Previous">‹</button>
    <span id="counter">1 / 1</span>
    <button id="next" aria-label="Next">›</button>
    <button id="fs" aria-label="Fullscreen">⛶</button>
  </div>

  <template id="logo-svg">
    <svg class="chrome-logo" width="148" height="32" viewBox="0 0 180 40" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#3B82F6"/><stop offset="100%" stop-color="#06B6D4"/></linearGradient>
      </defs>
      <path d="M18 4 L30 9 L30 20 C30 26.5 25 32 18 35.5 C11 32 6 26.5 6 20 L6 9 Z" fill="none" stroke="url(#lg)" stroke-width="1.6"/>
      <text x="42" y="26" font-family="Instrument Sans,sans-serif" font-size="18" font-weight="600" fill="#0f172a">School</text>
      <text x="103" y="26" font-family="Instrument Sans,sans-serif" font-size="18" font-weight="700" fill="#1d4ed8">Sync</text>
    </svg>
  </template>

  <script>
    const LOGO = document.getElementById('logo-svg').innerHTML;

    function chrome(right = 'Enterprise Briefing', dark = false) {
      return `<div class="chrome">
        ${LOGO}
        <span class="chrome-right">${right}</span>
      </div>`;
    }
    function foot(n, total, note = 'SchoolSync ERP · Confidential') {
      return `<div class="foot"><span><strong>SchoolSync</strong> · ${note}</span><span>Slide ${n} of ${total}</span></div>`;
    }

    const TOTAL = 22;
    const slides = [
      /* 1 COVER */
      `<section class="slide dark active">
        <div class="orb orb-1"></div><div class="orb orb-2"></div>
        <div class="accent-bar"></div>
        <div class="chrome" style="border:none;background:transparent">${LOGO.replace('#0f172a','#f1f5f9').replace('#1d4ed8','#60a5fa')}</div>
        <div class="content center" style="padding-top:0">
          <p class="kicker" style="color:#22d3ee">Enterprise School Management Platform</p>
          <h1 class="hero-title">School<span>Sync</span> ERP</h1>
          <p class="hero-sub">Unified platform for multi-branch school operations — admissions, finance, academics, and stakeholder portals.</p>
          <div class="hero-meta">
            <div><b>Prepared for</b><span>Organizational Leadership</span></div>
            <div><b>Scope</b><span>Full system overview & implementation</span></div>
            <div><b>Date</b><span>2026</span></div>
          </div>
        </div>
        ${foot(1, TOTAL, 'Executive Presentation')}
      </section>`,

      /* 2 AGENDA */
      `<section class="slide">
        ${chrome('Agenda')}
        <div class="content">
          <p class="kicker">Overview</p>
          <h1>Today's <span class="accent">agenda</span></h1>
          <div class="content-body">
            <ol class="agenda">
              <li>Executive summary <span>Platform value & scale</span></li>
              <li>Business challenge <span>Why schools need digital transformation</span></li>
              <li>Platform architecture <span>How SchoolSync works technically</span></li>
              <li>Stakeholder ecosystem <span>5 role-based portals</span></li>
              <li>Core workflows <span>Admissions, fees, attendance, academics</span></li>
              <li>Implementation roadmap <span>8 phases · 97 guided steps</span></li>
              <li>Enterprise capabilities <span>Multi-branch, security, reporting</span></li>
              <li>Next steps <span>Demo, pilot, and go-live</span></li>
            </ol>
          </div>
        </div>
        ${foot(2, TOTAL)}
      </section>`,

      /* 3 EXEC SUMMARY */
      `<section class="slide">
        ${chrome('Executive Summary')}
        <div class="content">
          <p class="kicker">At a glance</p>
          <h1>One platform. <span class="accent">Every school function.</span></h1>
          <p class="lead">SchoolSync is a cloud ERP that replaces fragmented tools with a single source of truth — from the boardroom dashboard to the parent mobile browser.</p>
          <div class="content-body">
            <div class="grid-4">
              <div class="metric"><div class="val">97</div><div class="lbl">Documented setup steps</div></div>
              <div class="metric"><div class="val">50+</div><div class="lbl">Integrated screens</div></div>
              <div class="metric"><div class="val">5</div><div class="lbl">Role-based portals</div></div>
              <div class="metric"><div class="val">16+</div><div class="lbl">Report categories</div></div>
            </div>
          </div>
        </div>
        ${foot(3, TOTAL)}
      </section>`,

      /* 4 SECTION - Challenge */
      `<section class="slide section dark">
        <div class="accent-bar"></div>
        ${chrome('Section 01', true)}
        <div class="content center">
          <div class="section-num">01</div>
          <h1 style="color:#fff;font-size:2.5rem">The Business<br/>Challenge</h1>
        </div>
        ${foot(4, TOTAL)}
      </section>`,

      /* 5 PROBLEM */
      `<section class="slide">
        ${chrome('Business Challenge')}
        <div class="content">
          <p class="kicker">Problem statement</p>
          <h1>Schools lose revenue & control with <span class="accent">fragmented systems</span></h1>
          <div class="content-body grid-2">
            <div class="panel neg"><h3>❌ Current state</h3><ul>
              <li>Fee tracking in Excel — collection gaps go unnoticed</li>
              <li>Paper attendance — parents uninformed until report day</li>
              <li>Manual admissions — lost applications, no audit trail</li>
              <li>Each branch runs different processes</li>
              <li>No real-time visibility for ownership</li>
            </ul></div>
            <div class="panel pos"><h3>✅ Target state with SchoolSync</h3><ul>
              <li>Automated fee billing + online payments</li>
              <li>Digital attendance → instant parent portal update</li>
              <li>Apply → Approve → Enroll digital pipeline</li>
              <li>Unified org dashboard across all branches</li>
              <li>Role-based portals for every stakeholder</li>
            </ul></div>
          </div>
        </div>
        ${foot(5, TOTAL)}
      </section>`,

      /* 6 SECTION - Solution */
      `<section class="slide section dark">
        <div class="accent-bar"></div>
        ${chrome('Section 02', true)}
        <div class="content center">
          <div class="section-num">02</div>
          <h1 style="color:#fff;font-size:2.5rem">Platform<br/>Architecture</h1>
        </div>
        ${foot(6, TOTAL)}
      </section>`,

      /* 7 WHAT IS */
      `<section class="slide">
        ${chrome('Platform Overview')}
        <div class="content">
          <p class="kicker">Solution</p>
          <h1>What is <span class="accent">SchoolSync</span>?</h1>
          <p class="lead">A multi-tenant SaaS ERP — each school operates in an isolated environment with its own branding, data, and users, while organization owners oversee all branches centrally.</p>
          <div class="content-body grid-3">
            <div class="panel"><div class="ico">☁️</div><h3>Cloud-native</h3><p>Browser access, no server maintenance. Deploy on Vercel or private cloud.</p></div>
            <div class="panel"><div class="ico">🏢</div><h3>Multi-tenant</h3><p>Each school = separate tenant. Data isolation with shared platform infrastructure.</p></div>
            <div class="panel"><div class="ico">🎨</div><h3>White-label</h3><p>Brand Studio — per-school logo, colors, and public website.</p></div>
          </div>
        </div>
        ${foot(7, TOTAL)}
      </section>`,

      /* 8 ARCHITECTURE */
      `<section class="slide">
        ${chrome('Architecture')}
        <div class="content">
          <p class="kicker">How it works</p>
          <h1>System <span class="accent">data flow</span></h1>
          <div class="content-body">
            <div class="pipeline">
              <div class="pipe-step">User<small>Web browser</small></div>
              <div class="pipe-step">Login<small>JWT + 2FA</small></div>
              <div class="pipe-step active">RBAC<small>Role router</small></div>
              <div class="pipe-step">Portal<small>Scoped UI</small></div>
              <div class="pipe-step">API<small>REST backend</small></div>
              <div class="pipe-step">Database<small>Tenant data</small></div>
            </div>
            <div class="grid-2" style="margin-top:16px">

    document.getElementById('deck').innerHTML = slides.join('');
    const slideEls = [...document.querySelectorAll('.slide')];
    let idx = 0;

    function show(i) {
      idx = Math.max(0, Math.min(slideEls.length - 1, i));
      slideEls.forEach((s, n) => s.classList.toggle('active', n === idx));
      document.getElementById('counter').textContent = (idx + 1) + ' / ' + slideEls.length;
    }

    document.getElementById('prev').onclick = () => show(idx - 1);
    document.getElementById('next').onclick = () => show(idx + 1);
    document.getElementById('fs').onclick = () => document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen();
    document.addEventListener('keydown', e => {
      if (['ArrowRight',' ','PageDown'].includes(e.key)) { e.preventDefault(); show(idx + 1); }
      if (['ArrowLeft','PageUp'].includes(e.key)) { e.preventDefault(); show(idx - 1); }
      if (e.key === 'Home') show(0);
      if (e.key === 'End') show(slideEls.length - 1);
    });
    show(0);
